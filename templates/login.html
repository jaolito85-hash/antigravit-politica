<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Acesso — Política Node Data</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: #0a0a0f;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', system-ui, sans-serif;
      background-image: radial-gradient(ellipse at 50% 0%, rgba(99,102,241,0.15) 0%, transparent 60%);
    }
    .card {
      background: #111118;
      border: 1px solid rgba(99,102,241,0.25);
      border-radius: 16px;
      padding: 48px 40px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.6);
    }
    .logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .logo svg {
      width: 48px;
      height: 48px;
      margin-bottom: 12px;
    }
    .logo h1 {
      font-size: 1.3rem;
      font-weight: 700;
      color: #e2e8f0;
      letter-spacing: -0.02em;
    }
    .logo p {
      font-size: 0.8rem;
      color: #64748b;
      margin-top: 4px;
    }
    .form-group {
      margin-bottom: 18px;
    }
    label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      color: #94a3b8;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    input {
      width: 100%;
      padding: 11px 14px;
      background: #1a1a2e;
      border: 1px solid rgba(99,102,241,0.2);
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus {
      border-color: rgba(99,102,241,0.6);
      box-shadow: 0 0 0 3px rgba(99,102,241,0.1);
    }
    .error {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      color: #f87171;
      font-size: 0.82rem;
      padding: 10px 14px;
      border-radius: 8px;
      margin-bottom: 18px;
    }
    button {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #6366f1, #4f46e5);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      margin-top: 4px;
    }
    button:hover { opacity: 0.9; }
    button:active { transform: scale(0.99); }
    .footer {
      text-align: center;
      margin-top: 24px;
      font-size: 0.72rem;
      color: #334155;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="24" cy="24" r="23" stroke="#6366f1" stroke-width="2"/>
        <path d="M14 32 L24 14 L34 32" stroke="#6366f1" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M17 26 H31" stroke="#6366f1" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <h1>Política Node Data</h1>
      <p>Painel de Inteligência Eleitoral</p>
    </div>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/login">
      <div class="form-group">
        <label>Usuário</label>
        <input type="text" name="username" autocomplete="username" autofocus required />
      </div>
      <div class="form-group">
        <label>Senha</label>
        <input type="password" name="password" autocomplete="current-password" required />
      </div>
      <button type="submit">Entrar</button>
    </form>

    <div class="footer">Acesso restrito · Nodedata &copy; 2024</div>
  </div>
</body>
</html>
